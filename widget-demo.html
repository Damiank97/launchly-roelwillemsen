<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Demo — Roel Willemsen</title>
<style>
  body { font-family: sans-serif; background: #f5f2eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: white; border-radius: 16px; padding: 48px; max-width: 500px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { background: #1a5c3a; color: white; display: inline-block; padding: 8px 20px; border-radius: 8px; font-weight: 700; margin-bottom: 24px; }
  h1 { color: #1a5c3a; margin-bottom: 12px; }
  p { color: #6b7280; line-height: 1.6; margin-bottom: 8px; }
  .arrow { font-size: 32px; margin-top: 24px; animation: bounce 1.5s infinite; display: block; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏠 Roel Willemsen</div>
  <h1>Widget Demo</h1>
  <p>Dit is een testpagina voor de AI-chatbot widget.</p>
  <p>De widget laadt automatisch rechtsonder in het scherm.</p>
  <p><strong>Klik op de groene knop ↘ om te testen!</strong></p>
  <span class="arrow">↘</span>
</div>

<!-- Widget wordt geladen vanuit Vercel -->
<script src="/widget/roelwillemsen.js"></script>
</body>
</html>
